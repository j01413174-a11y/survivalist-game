<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SURVIVALIST</title><style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');:root{--sand:#c8a040;--ocean:#1a4a6b;--ui-bg:rgba(6,12,8,.94);--ui-border:#2a4a1a;--gold:#c8a030;--text:#d4c9a0;}*{margin:0;padding:0;box-sizing:border-box}body{background:#000;font-family:'Cinzel',serif;color:var(--text);overflow:hidden;cursor:crosshair}canvas{display:block;image-rendering:pixelated;width:100vw;height:100vh;outline:none}#title-screen{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,#0a1f0f,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}#title-screen h1{font-size:clamp(2.2rem,8vw,5rem);letter-spacing:.15em;color:var(--sand);text-shadow:0 0 80px rgba(200,169,110,.4)}#title-screen .sub{font-size:1.1rem;letter-spacing:.4em;color:#3a6b20;margin:1rem 0}.menu-btns{display:flex;flex-direction:column;gap:.8rem;margin-top:2rem}.menu-btn{font-size:1rem;letter-spacing:.2em;padding:.7rem 1.5rem;border:1px solid var(--ui-border);background:rgba(25,50,15,.3);color:var(--text);cursor:pointer;transition:all .2s;text-transform:uppercase;border-radius:.5em}.menu-btn:hover{border-color:var(--sand);color:var(--sand);box-shadow:0 0 20px rgba(200,169,110,.2)}.menu-btn.primary{border-color:var(--gold);color:var(--gold)}#lobby-screen{position:absolute;inset:0;background:rgba(3,8,5,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:190}#lobby-screen h2{font-size:2rem;color:var(--gold);letter-spacing:.2em;margin-bottom:1rem}.lobby-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;width:min(435px,96vw)}.lobby-card{background:var(--ui-bg);border:1px solid var(--ui-border);padding:1rem;cursor:pointer;transition:all .2s;border-radius:.38em}.lobby-card:hover{border-color:var(--sand);box-shadow:0 0 7px var(--sand)}.lobby-card h3{color:var(--sand);letter-spacing:.1em;margin-bottom:.5rem}.lobby-card .status{font-size:.75rem;color:#40aa60}input{font-family:'Cinzel',serif;background:rgba(20,40,15,.85);border:1px solid var(--ui-border);color:var(--text);padding:.5rem 1rem;font-size:1rem;width:200px;text-align:center;margin-bottom:.8rem;border-radius:.43em}input:focus{outline:none;border-color:var(--gold)}#game-ui{position:absolute;inset:0;pointer-events:none;display:none}#stats-panel{position:absolute;top:.8rem;left:.8rem;background:var(--ui-bg);border:1px solid var(--ui-border);padding:.6rem .9rem;min-width:165px;border-radius:.4em}.stat-row{display:flex;align-items:center;gap:.3rem;font-size:.93rem;margin-bottom:.4rem}.stat-label{width:54px;font-size:.62rem;opacity:.9}.stat-bar-bg{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}.stat-bar-fill{height:100%;border-radius:2px;transition:width .4s}#time-bar{position:absolute;top:.8rem;left:50%;transform:translateX(-50%);font-size:.77rem;letter-spacing:.15em;color:var(--sand);background:var(--ui-bg);border:1px solid var(--ui-border);padding:.25rem .85rem;text-align:center;border-radius:.7em}</style></head><body><canvas id="gameCanvas" tabindex="0"></canvas><div id="title-screen"><div class="sub">— Island of Ruin —</div><h1>SURVIVALIST</h1><div style="color:#6a9060;margin-top:1.2rem;font-style:italic">Hunt. Fish. Craft. Endure. Or perish.</div><div class="menu-btns"><button class="menu-btn primary" onclick="showLobby()">⚔ Enter the World</button><button class="menu-btn" onclick="startSolo()">🗺️ Solo Mode</button></div></div><div id="lobby-screen"><h2>🌍 CHOOSE YOUR SERVER</h2><input id="player-name-input" placeholder="Enter your name..." maxlength="16" value="Survivor"><div class="lobby-grid"><div class="lobby-card" onclick="joinServer('Island Alpha')"><h3>🏝️ Island Alpha</h3><div class="status">● 3/8 LIVE</div></div><div class="lobby-card" onclick="joinServer('Volcano Isle')"><h3>🌋 Volcano Isle</h3><div class="status">● 5/8 LIVE</div></div><div class="lobby-card" onclick="joinServer('Frozen Shores')"><h3>❄ Frozen Shores</h3><div class="status">● 1/8 LIVE</div></div><div class="lobby-card" onclick="joinServer('Swamp World')"><h3>🌿 Swamp World</h3><div class="status">⚠ 7/8 FULL</div></div></div><button class="menu-btn" style="margin-top:1.2rem" onclick="switchToTitle()">← Back</button></div><div id="game-ui"><div id="stats-panel"><div class="stat-row"><span class="stat-label" style="color:#cc5555">❤ Health</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="background:#cc3333;width:100%"></div></div><span style="width:38px;text-align:right;font-size:.68rem">100</span></div><div class="stat-row"><span class="stat-label" style="color:#c87820">🍖 Hunger</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="background:#c87820;width:100%"></div></div><span style="width:38px;text-align:right;font-size:.68rem">100</span></div><div class="stat-row"><span class="stat-label" style="color:#2080cc">💧 Thirst</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="background:#2080cc;width:100%"></div></div><span style="width:38px;text-align:right;font-size:.68rem">100</span></div></div><div id="time-bar"><span>Day 1 — Dawn | ☀ Clear skies</span></div></div><script>function resizeCanvas(){const c=document.getElementById('gameCanvas');c.width=window.innerWidth;c.height=window.innerHeight}window.addEventListener('resize',resizeCanvas);resizeCanvas();function showLobby(){document.getElementById('title-screen').style.display='none';document.getElementById('lobby-screen').style.display='flex';setTimeout(()=>{document.getElementById('player-name-input').focus()},140)}function switchToTitle(){document.getElementById('lobby-screen').style.display='none';document.getElementById('title-screen').style.display='flex'}function joinServer(s){alert('Joining '+s+' as '+document.getElementById('player-name-input').value+'... Ready to survive!');document.getElementById('lobby-screen').style.display='none';document.getElementById('game-ui').style.display='block'}function startSolo(){document.getElementById('title-screen').style.display='none';document.getElementById('game-ui').style.display='block'}</script></body></html>
